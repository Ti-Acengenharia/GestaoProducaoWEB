name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Testar e compilar o Backend (Java Spring Boot)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        run: |
          cd Backend/gestaoproducao
          chmod +x mvnw
          ./mvnw clean package -DskipTests

  # Job 2: Testar e compilar o Frontend (React / Vite)
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies and Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  # Job 3: Validar a build das Imagens Docker
  docker-build:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # (Opcional) Logar em um registro como Docker Hub ou GHCR caso queira fazer o push
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/gestaoproducao
          file: ./Backend/gestaoproducao/Dockerfile
          push: false # Mudar para true se habilitar o login acima
          tags: gestaoproducaoweb-backend:latest

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false # Mudar para true se habilitar o login acima
          tags: gestaoproducaoweb-frontend:latest

  # Job 4: Deploy Automático na VPS via SSH
  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            git pull origin main
            docker compose down
            docker compose up -d --build
