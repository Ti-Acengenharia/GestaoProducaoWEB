version: '3.8'

services:
  mariadb:
    image: 'mariadb:latest'
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: ./Backend/gestaoproducao
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "${HOST_PORT_BACKEND:-8081}:8080"
    depends_on:
      - mariadb

  frontend:
    build:
      context: ./frontend
    ports:
      - "${HOST_PORT_FRONTEND:-8082}:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
